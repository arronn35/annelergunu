<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Annelik sana çok yakıştı, biricik ablacığım</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Caveat:wght@400;500;600;700&family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-1: #FFF5F7;
    --bg-2: #FFE8EE;
    --bg-3: #FFDCE6;
    --pink-50: #FFF0F5;
    --pink-100: #FFD6E2;
    --pink-200: #FFB6C8;
    --pink-300: #FF9BB5;
    --pink-400: #F48FB1;
    --pink-500: #EC407A;
    --pink-600: #D81B60;
    --pink-700: #AD1457;
    --cream: #FFFAF5;
    --gold: #E8B86F;
    --gold-light: #F5D89E;
    --ink: #4A2C3A;
    --ink-soft: #7A5566;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --script: 'Caveat', cursive;
    --sans: 'Quicksand', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { overflow-x: hidden; }
  body {
    font-family: var(--sans);
    color: var(--ink);
    background:
      radial-gradient(ellipse at 20% 0%, #FFE0EB 0%, transparent 50%),
      radial-gradient(ellipse at 80% 30%, #FFD0E0 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, #FFE8F0 0%, transparent 60%),
      linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
    background-attachment: fixed;
    min-height: 100vh;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  #root { position: relative; }

  /* ===== Falling petals (global) ===== */
  .petals-layer {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 1;
    overflow: hidden;
  }
  .petal {
    position: absolute;
    top: -40px;
    width: 18px; height: 18px;
    will-change: transform;
    opacity: 0.85;
  }
  @keyframes petalFall {
    0% { transform: translate3d(0, -10vh, 0) rotate(0deg); }
    100% { transform: translate3d(var(--drift, 80px), 110vh, 0) rotate(720deg); }
  }
  @keyframes petalSway {
    0%, 100% { margin-left: 0; }
    50% { margin-left: 40px; }
  }

  /* ===== Splash / Hero ===== */
  .stage {
    position: relative;
    min-height: 100vh;
    width: 100%;
    overflow: hidden;
  }
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px 80px;
    position: relative;
    z-index: 2;
  }
  .hero-eyebrow {
    font-family: var(--script);
    font-size: clamp(20px, 2.4vw, 30px);
    color: var(--pink-500);
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    opacity: 0;
    animation: fadeUp 1.2s 0.2s forwards;
  }
  .hero-title {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 500;
    font-size: clamp(36px, 6.2vw, 84px);
    line-height: 1.05;
    color: var(--pink-700);
    max-width: 18ch;
    text-wrap: balance;
    margin: 0 auto 14px;
    opacity: 0;
    animation: fadeUp 1.2s 0.5s forwards;
    text-shadow: 0 2px 30px rgba(236, 64, 122, 0.15);
  }
  .hero-title .amp {
    font-family: var(--script);
    color: var(--pink-500);
    font-style: normal;
  }
  .hero-sub {
    font-family: var(--serif);
    font-size: clamp(16px, 1.6vw, 22px);
    color: var(--ink-soft);
    max-width: 42ch;
    margin: 0 auto;
    font-style: italic;
    opacity: 0;
    animation: fadeUp 1.2s 0.8s forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== 3D Floating field (flowers, butterflies, hearts) ===== */
  .field {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    perspective: 1200px;
  }
  .floater {
    position: absolute;
    will-change: transform;
    filter: drop-shadow(0 8px 20px rgba(216, 27, 96, 0.18));
    animation: floatY 7s ease-in-out infinite, spinSlow 18s linear infinite;
    transform-style: preserve-3d;
  }
  @keyframes floatY {
    0%, 100% { translate: 0 0; }
    50% { translate: 0 -22px; }
  }
  @keyframes spinSlow {
    from { rotate: y 0deg; }
    to { rotate: y 360deg; }
  }
  @keyframes flutter {
    0%, 100% { transform: scale(1, 1); }
    50% { transform: scale(0.6, 1); }
  }
  .butterfly-wing { transform-origin: center; animation: flutter 0.4s ease-in-out infinite; }

  /* ===== Heart gift box ===== */
  .gift-wrap {
    position: relative;
    z-index: 3;
    margin-top: 40px;
    cursor: pointer;
    transform-style: preserve-3d;
    animation: giftPulse 2.4s ease-in-out infinite;
    transition: transform 0.4s cubic-bezier(.2,.9,.3,1.4);
    width: clamp(220px, 28vw, 320px);
    height: clamp(220px, 28vw, 320px);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    animation: fadeUp 1.2s 1.1s forwards, giftPulse 2.4s 2.3s ease-in-out infinite;
  }
  .gift-wrap:hover { transform: scale(1.08) rotateZ(-3deg); }
  .gift-wrap:active { transform: scale(0.96); }

  @keyframes giftPulse {
    0%, 100% { filter: drop-shadow(0 20px 40px rgba(216, 27, 96, 0.35)); }
    50% { filter: drop-shadow(0 30px 60px rgba(236, 64, 122, 0.55)); }
  }

  .gift-glow {
    position: absolute;
    inset: -30%;
    background: radial-gradient(circle, rgba(255, 182, 200, 0.6) 0%, transparent 60%);
    border-radius: 50%;
    animation: glowPulse 3s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes glowPulse {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.15); }
  }

  .gift-tap-hint {
    position: absolute;
    bottom: -50px;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--script);
    font-size: 26px;
    color: var(--pink-500);
    white-space: nowrap;
    animation: hintBob 2s ease-in-out infinite;
  }
  @keyframes hintBob {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(-6px); }
  }

  .scroll-cue {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--script);
    font-size: 22px;
    color: var(--pink-500);
    opacity: 0.85;
    animation: scrollBob 2s ease-in-out infinite;
  }
  @keyframes scrollBob {
    0%, 100% { transform: translateX(-50%) translateY(0); opacity: 0.6; }
    50% { transform: translateX(-50%) translateY(8px); opacity: 1; }
  }

  /* ===== Reveal overlay ===== */
  .reveal-overlay {
    position: fixed; inset: 0;
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
    background: radial-gradient(circle at center, rgba(255, 240, 245, 0) 0%, rgba(255, 240, 245, 0) 100%);
    transition: background 0.8s ease;
  }
  .reveal-overlay.active {
    pointer-events: auto;
    background: radial-gradient(circle at center, rgba(255, 240, 245, 0.85) 0%, rgba(255, 220, 230, 0.9) 100%);
  }
  .confetti-burst {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .confetti {
    position: absolute;
    top: 50%; left: 50%;
    width: 14px; height: 14px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    will-change: transform, opacity;
  }
  @keyframes confettiFly {
    0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
    20% { opacity: 1; }
    100% { transform: translate(calc(-50% + var(--cx)), calc(-50% + var(--cy))) scale(var(--cs, 1)) rotate(var(--cr, 0deg)); opacity: 0; }
  }

  .glow-burst {
    position: absolute;
    width: 100px; height: 100px;
    border-radius: 50%;
    background: radial-gradient(circle, #fff 0%, #FFC4D6 30%, transparent 70%);
    animation: glowExpand 1.6s ease-out forwards;
  }
  @keyframes glowExpand {
    0% { transform: scale(0); opacity: 1; }
    50% { opacity: 1; }
    100% { transform: scale(20); opacity: 0; }
  }

  /* ===== Audio reveal panel ===== */
  .audio-reveal {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0.5);
    opacity: 0;
    z-index: 101;
    pointer-events: none;
    transition: all 0.9s cubic-bezier(.2,.9,.3,1.2);
    width: min(560px, 92vw);
  }
  .audio-reveal.show {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
    pointer-events: auto;
  }
  .audio-card {
    background: linear-gradient(160deg, #fff 0%, #FFF5F8 100%);
    border-radius: 32px;
    padding: 48px 36px 36px;
    box-shadow:
      0 30px 80px rgba(216, 27, 96, 0.25),
      0 10px 30px rgba(216, 27, 96, 0.15),
      inset 0 1px 0 rgba(255, 255, 255, 0.9);
    text-align: center;
    border: 1px solid rgba(255, 182, 200, 0.4);
    position: relative;
    overflow: hidden;
  }
  .audio-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at top, rgba(255, 182, 200, 0.3) 0%, transparent 60%);
    pointer-events: none;
  }
  .audio-eyebrow {
    font-family: var(--script);
    font-size: 22px;
    color: var(--pink-500);
    margin-bottom: 4px;
  }
  .audio-title {
    font-family: var(--serif);
    font-style: italic;
    font-size: 30px;
    color: var(--pink-700);
    margin-bottom: 20px;
    line-height: 1.2;
  }
  .audio-close {
    position: absolute;
    top: 14px; right: 14px;
    width: 36px; height: 36px;
    border: none;
    background: rgba(255, 182, 200, 0.3);
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--pink-600);
    font-size: 18px;
    transition: all 0.2s;
    z-index: 2;
  }
  .audio-close:hover { background: rgba(255, 182, 200, 0.6); transform: scale(1.05); }

  /* ===== Custom audio player ===== */
  .player {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    background: linear-gradient(135deg, #FFF0F5 0%, #FFD6E2 100%);
    border-radius: 100px;
    box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.6), 0 4px 12px rgba(216, 27, 96, 0.1);
    position: relative;
    z-index: 1;
  }
  .play-btn {
    width: 56px; height: 56px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #F48FB1 0%, #EC407A 100%);
    color: white;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 6px 16px rgba(236, 64, 122, 0.4);
    transition: transform 0.2s;
  }
  .play-btn:hover { transform: scale(1.06); }
  .play-btn:active { transform: scale(0.94); }
  .player-track {
    flex: 1;
    height: 6px;
    background: rgba(255, 255, 255, 0.6);
    border-radius: 3px;
    position: relative;
    cursor: pointer;
    overflow: hidden;
  }
  .player-fill {
    position: absolute;
    inset: 0 auto 0 0;
    background: linear-gradient(90deg, #F48FB1, #EC407A);
    border-radius: 3px;
    width: 0%;
    transition: width 0.1s linear;
  }
  .player-time {
    font-family: var(--sans);
    font-weight: 600;
    font-size: 13px;
    color: var(--pink-600);
    min-width: 40px;
    text-align: right;
  }

  .audio-waves {
    display: flex; align-items: center; justify-content: center;
    gap: 4px;
    margin: 16px 0 20px;
    height: 36px;
  }
  .wave-bar {
    width: 4px;
    background: linear-gradient(180deg, #F48FB1, #EC407A);
    border-radius: 2px;
    animation: waveBounce 1.4s ease-in-out infinite;
    opacity: 0.8;
  }
  .wave-bar.idle { animation-play-state: paused; height: 8px !important; }
  @keyframes waveBounce {
    0%, 100% { height: 8px; }
    50% { height: 32px; }
  }

  /* ===== Sticky persistent audio + gift sticker ===== */
  .floating-player {
    position: fixed;
    top: 18px; right: 18px;
    z-index: 50;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 100px;
    padding: 10px 14px 10px 10px;
    display: flex; align-items: center; gap: 10px;
    box-shadow: 0 8px 24px rgba(216, 27, 96, 0.18);
    border: 1px solid rgba(255, 182, 200, 0.5);
    transform: translateY(-120%);
    opacity: 0;
    transition: all 0.6s cubic-bezier(.2,.9,.3,1.2);
  }
  .floating-player.visible {
    transform: translateY(0);
    opacity: 1;
  }
  .floating-player .play-btn { width: 40px; height: 40px; box-shadow: 0 4px 10px rgba(236, 64, 122, 0.3); }
  .floating-player .floating-label {
    font-family: var(--serif);
    font-style: italic;
    font-size: 14px;
    color: var(--pink-600);
    padding-right: 6px;
    white-space: nowrap;
  }

  .gift-sticker {
    position: fixed;
    top: 16px; left: 16px;
    width: 78px; height: 78px;
    z-index: 51;
    cursor: pointer;
    border: none;
    background: transparent;
    padding: 0;
    transform: scale(0) rotate(-30deg);
    transition: transform 0.6s cubic-bezier(.2,.9,.3,1.6);
    filter: drop-shadow(0 6px 14px rgba(216, 27, 96, 0.25));
  }
  .gift-sticker.visible {
    transform: scale(1) rotate(-12deg);
    animation: stickerWiggle 4s ease-in-out 1s infinite;
  }
  .gift-sticker:hover { transform: scale(1.12) rotate(-5deg); animation: none; }
  @keyframes stickerWiggle {
    0%, 90%, 100% { transform: scale(1) rotate(-12deg); }
    93% { transform: scale(1.06) rotate(-18deg); }
    96% { transform: scale(1.06) rotate(-6deg); }
  }
  .gift-sticker-tooltip {
    position: absolute;
    top: 84px;
    left: 6px;
    font-family: var(--script);
    font-size: 18px;
    color: var(--pink-600);
    background: rgba(255, 255, 255, 0.9);
    padding: 4px 12px;
    border-radius: 100px;
    white-space: nowrap;
    box-shadow: 0 4px 10px rgba(216, 27, 96, 0.15);
    opacity: 0;
    transform: translateY(-4px);
    transition: all 0.3s;
    pointer-events: none;
  }
  .gift-sticker:hover + .gift-sticker-tooltip,
  .gift-sticker:focus + .gift-sticker-tooltip { opacity: 1; transform: translateY(0); }

  /* ===== Section divider ===== */
  .section {
    position: relative;
    z-index: 2;
    padding: 80px 24px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .section-eyebrow {
    font-family: var(--script);
    font-size: 26px;
    color: var(--pink-500);
    text-align: center;
    margin-bottom: 6px;
  }
  .section-title {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 500;
    font-size: clamp(32px, 4vw, 52px);
    color: var(--pink-700);
    text-align: center;
    margin-bottom: 12px;
    line-height: 1.1;
  }
  .section-sub {
    font-family: var(--serif);
    font-size: 18px;
    color: var(--ink-soft);
    text-align: center;
    max-width: 50ch;
    margin: 0 auto 40px;
    font-style: italic;
  }

  /* ===== Photo slider ===== */
  .photos-section { padding-bottom: 60px; }
  .slider-viewport {
    overflow: hidden;
    padding: 30px 0;
    margin: 0 -24px;
    cursor: grab;
    user-select: none;
  }
  .slider-viewport:active { cursor: grabbing; }
  .slider-track {
    display: flex;
    gap: 24px;
    padding: 0 max(24px, calc(50vw - 280px));
    transition: transform 0.4s cubic-bezier(.2,.9,.3,1);
    will-change: transform;
  }
  .slider-track.dragging { transition: none; }
  .photo-card {
    flex: 0 0 clamp(260px, 36vw, 460px);
    aspect-ratio: 3 / 4;
    border-radius: 24px;
    overflow: hidden;
    background: linear-gradient(135deg, #FFE8EE, #FFD6E2);
    position: relative;
    box-shadow: 0 20px 50px rgba(216, 27, 96, 0.18), 0 6px 14px rgba(216, 27, 96, 0.1);
    transition: transform 0.5s cubic-bezier(.2,.9,.3,1);
  }
  .photo-card.is-active { transform: scale(1.04); box-shadow: 0 30px 70px rgba(216, 27, 96, 0.28); }
  .photo-card img {
    width: 100%; height: 100%; object-fit: cover;
    pointer-events: none;
  }
  .photo-card .photo-delete {
    position: absolute;
    top: 12px; right: 12px;
    width: 32px; height: 32px;
    border-radius: 50%;
    border: none;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(8px);
    color: var(--pink-600);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .photo-card:hover .photo-delete { opacity: 1; }
  .photo-card.add-card {
    background: linear-gradient(135deg, #FFF5F8, #FFE8EE);
    border: 2px dashed var(--pink-300);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer;
    text-align: center;
    padding: 24px;
    transition: all 0.3s;
  }
  .photo-card.add-card:hover {
    border-color: var(--pink-500);
    background: linear-gradient(135deg, #FFF0F5, #FFD6E2);
    transform: scale(1.02);
  }
  .add-card-icon {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, #F48FB1, #EC407A);
    color: white;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 16px;
    box-shadow: 0 8px 18px rgba(236, 64, 122, 0.3);
    font-size: 28px;
  }
  .add-card-title {
    font-family: var(--serif);
    font-style: italic;
    font-size: 22px;
    color: var(--pink-700);
    margin-bottom: 6px;
  }
  .add-card-sub {
    font-family: var(--sans);
    font-size: 13px;
    color: var(--ink-soft);
  }

  .slider-controls {
    display: flex; justify-content: center; gap: 12px;
    margin-top: 24px;
  }
  .slider-btn {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 1px solid rgba(216, 27, 96, 0.2);
    background: white;
    color: var(--pink-600);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    box-shadow: 0 4px 12px rgba(216, 27, 96, 0.1);
  }
  .slider-btn:hover { background: var(--pink-500); color: white; transform: translateY(-2px); }
  .slider-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .slider-dots {
    display: flex; gap: 8px;
    align-items: center;
  }
  .slider-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--pink-200);
    border: none;
    padding: 0;
    cursor: pointer;
    transition: all 0.3s;
  }
  .slider-dot.active { width: 24px; border-radius: 4px; background: var(--pink-500); }

  /* ===== Notes section ===== */
  .notes-section {
    background: linear-gradient(180deg, transparent 0%, rgba(255, 240, 245, 0.6) 30%, rgba(255, 240, 245, 0.6) 100%);
    padding-bottom: 120px;
  }
  .note-form {
    max-width: 560px;
    margin: 0 auto 50px;
    background: rgba(255, 255, 255, 0.75);
    backdrop-filter: blur(10px);
    border-radius: 24px;
    padding: 28px;
    box-shadow: 0 12px 36px rgba(216, 27, 96, 0.12);
    border: 1px solid rgba(255, 182, 200, 0.4);
  }
  .note-form-row {
    display: flex; flex-direction: column;
    gap: 14px;
  }
  .note-input, .note-textarea {
    width: 100%;
    padding: 14px 18px;
    border: 1px solid rgba(216, 27, 96, 0.15);
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.85);
    font-family: var(--sans);
    font-size: 15px;
    color: var(--ink);
    resize: none;
    transition: all 0.2s;
    outline: none;
  }
  .note-input:focus, .note-textarea:focus {
    border-color: var(--pink-500);
    background: white;
    box-shadow: 0 0 0 4px rgba(236, 64, 122, 0.1);
  }
  .note-textarea { min-height: 110px; line-height: 1.5; }
  .note-submit {
    align-self: flex-end;
    padding: 12px 28px;
    border: none;
    border-radius: 100px;
    background: linear-gradient(135deg, #F48FB1 0%, #EC407A 100%);
    color: white;
    font-family: var(--sans);
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.5px;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(236, 64, 122, 0.3);
    transition: all 0.2s;
    display: flex; align-items: center; gap: 8px;
  }
  .note-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(236, 64, 122, 0.4); }
  .note-submit:active { transform: translateY(0); }

  .notes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
    max-width: 1100px;
    margin: 0 auto;
  }
  .note-card {
    padding: 24px;
    border-radius: 18px;
    background: white;
    box-shadow: 0 8px 24px rgba(216, 27, 96, 0.08), 0 2px 6px rgba(216, 27, 96, 0.05);
    border: 1px solid rgba(255, 182, 200, 0.3);
    position: relative;
    transition: all 0.3s;
    animation: noteIn 0.5s cubic-bezier(.2,.9,.3,1.2) backwards;
  }
  .note-card:nth-child(3n+1) { background: linear-gradient(160deg, #FFF 0%, #FFF5F8 100%); }
  .note-card:nth-child(3n+2) { background: linear-gradient(160deg, #FFFAF5 0%, #FFE8EE 100%); }
  .note-card:nth-child(3n+3) { background: linear-gradient(160deg, #FFF0F5 0%, #FFE0EB 100%); }
  .note-card:hover { transform: translateY(-4px); box-shadow: 0 16px 36px rgba(216, 27, 96, 0.15); }
  @keyframes noteIn {
    from { opacity: 0; transform: translateY(20px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .note-quote {
    font-family: var(--serif);
    font-style: italic;
    font-size: 17px;
    color: var(--ink);
    line-height: 1.6;
    margin-bottom: 16px;
    text-wrap: pretty;
  }
  .note-quote::before {
    content: '"';
    font-family: var(--serif);
    font-size: 56px;
    color: var(--pink-300);
    line-height: 0;
    vertical-align: -20px;
    margin-right: 4px;
  }
  .note-author {
    display: flex; align-items: center; gap: 10px;
    padding-top: 14px;
    border-top: 1px dashed rgba(216, 27, 96, 0.2);
  }
  .note-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, #F48FB1, #EC407A);
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--serif);
    font-weight: 600;
    font-size: 14px;
    flex-shrink: 0;
  }
  .note-author-name {
    font-family: var(--script);
    font-size: 22px;
    color: var(--pink-600);
    line-height: 1;
  }
  .note-author-time {
    font-family: var(--sans);
    font-size: 11px;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }
  .note-delete {
    position: absolute;
    top: 12px; right: 12px;
    width: 26px; height: 26px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--pink-300);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transition: all 0.2s;
  }
  .note-card:hover .note-delete { opacity: 1; }
  .note-delete:hover { background: rgba(216, 27, 96, 0.1); color: var(--pink-600); }

  .notes-empty {
    text-align: center;
    padding: 40px 24px;
    grid-column: 1 / -1;
    font-family: var(--serif);
    font-style: italic;
    font-size: 18px;
    color: var(--ink-soft);
  }

  .footer {
    text-align: center;
    padding: 50px 24px;
    font-family: var(--script);
    font-size: 22px;
    color: var(--pink-500);
    position: relative; z-index: 2;
  }
  .footer-heart {
    display: inline-block;
    color: var(--pink-500);
    animation: heartBeat 1.4s ease-in-out infinite;
    margin: 0 4px;
  }
  @keyframes heartBeat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
  }

  /* Lock scroll while in splash mode */
  body.splash-locked {
    overflow: hidden;
    height: 100vh;
  }

  /* Hide hero after first reveal */
  .hero.fading {
    transition: opacity 1s ease, transform 1s ease;
    opacity: 0;
    transform: scale(0.96);
    pointer-events: none;
  }

  @media (max-width: 640px) {
    .floating-player .floating-label { display: none; }
    .gift-sticker { width: 64px; height: 64px; }
    .audio-card { padding: 36px 22px 26px; }
    .audio-title { font-size: 24px; }
    .photo-card { flex-basis: 78vw; }
    .slider-track { padding: 0 11vw; }
    .note-form { padding: 22px; }
  }
</style>
</head>
